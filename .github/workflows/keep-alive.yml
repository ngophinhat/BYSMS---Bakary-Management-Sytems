name: Keep Backend Alive

on:
  schedule:
    # Chỉ ping trong giờ hoạt động thực tế (6h sáng - 10h đêm giờ VN, UTC+7).
    # Quy đổi sang UTC: 23:00 UTC hôm trước -> 15:00 UTC hôm sau (vắt qua nửa đêm UTC).
    # Đỡ tốn quota 750h/tháng của Render free tier so với ping 24/7.
    - cron: "*/4 23 * * *"
    - cron: "*/4 0-15 * * *"
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping backend health check
        run: |
          curl -sS -o /dev/null -w "HTTP %{http_code} - %{time_total}s\n" \
            https://bysms-bakary-management-sytems.onrender.com/ \
            --max-time 60 || echo "Ping thất bại (server có thể đang cold start)"
